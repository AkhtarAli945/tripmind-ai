version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: tripmind-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    networks:
      - tripmind-network

  redis:
    image: redis:7-alpine
    container_name: tripmind-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - tripmind-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: tripmind-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ../backend/.env
    environment:
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/tripmind-ai?authSource=admin
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongodb
      - redis
    networks:
      - tripmind-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: tripmind-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - tripmind-network

volumes:
  mongodb_data:

networks:
  tripmind-network:
    driver: bridge
